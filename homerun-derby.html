  .lbl { font-size: 11.5px; color: #94a3b8; margin: 8px 0 4px; }

  .btn-green:hover { background: #10b981; }
  .btn-slate { background: #475569; border-radius: 11px; padding: 11px 16px; font-weight: 800; font-size: 14px; }

          <div id="parkInfo"></div>
          <div class="lbl">타자 선택</div>

          <div class="btn-row"><button id="startBtn" class="btn-green">▶ 시작 (아웃 5)</button></div>

        </div>
      </div>
      <div id="overOv" class="overlay" hidden>
        <div class="card">
          <div class="res" id="overRes">🎉 경기 종료!</div>
          <div class="sub" id="overSub">홈런 0개</div>
          <div id="regBox">
            <input id="nameInput" maxlength="12" placeholder="닉네임" />
            <div class="btn-row"><button id="regBtn" class="btn-green">랭킹 등록</button></div>
            <div id="regMsg" class="muted"></div>
          </div>
          <p id="overBest" class="muted"></p>
          <div class="btn-row">
            <button id="lbBtn2" class="btn-slate">🏆 랭킹</button>
            <button id="againBtn" class="btn-green">다시 하기</button>
            <button id="homeBtn" class="btn-slate">처음으로</button>
          </div>
        </div>
      </div>
      <div id="lbOv" class="overlay" hidden>
        <div class="card">
          <div class="res" style="font-size:21px;">🏆 온라인 랭킹</div>
          <div id="lbList" class="lblist"></div>
          <div id="lbNote" class="muted"></div>
          <div class="btn-row"><button id="lbClose" class="btn-slate">닫기</button></div>
        </div>
      </div>
    </div>
  </div>
  <div class="controls">

    <button id="waitBtn" class="btn-wait big" hidden disabled>…</button>
  </div>
</div>

        var rows = []; snap.forEach(function (d) { rows.push(d.data()); });
        rows.sort(function (a, b) { return (b.hr - a.hr) || ((b.longest || 0) - (a.longest || 0)); });
        lbRows = rows.slice(0, 10); refreshLeaderboardViews();
      }, function () {});
    } catch (e) { fbReady = false; }
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
  function openLeaderboard() { refreshLeaderboardViews(); $("lbOv").hidden = false; }

  function setFlash(text, type) { var fl = $("flash"); fl.className = "flash " + type; fl.querySelector(".txt").textContent = text; }
  function updateUI() {
    $("hrVal").textContent = S.hr;
    $("longVal").textContent = S.longestM > 0 ? Math.round(S.longestM) + " m" : "-";
    var dh = ""; for (var i = 0; i < S.totalOuts; i++) dh += '<span class="od ' + (i < S.outsLeft ? "on" : "") + '"></span>';
    $("outDots").innerHTML = dh;
    $("startOv").hidden = S.phase !== "start";
    $("overOv").hidden = S.phase !== "over";
    if (S.phase === "start") refreshLeaderboardViews();
    if (S.phase === "over") {
      var pl = TEAMS[S.team].players[S.player];
      $("overSub").textContent = TEAMS[S.team].a + " " + pl.n + " · " + activePark.n + " · 홈런 " + S.hr + "개" + (S.longestM > 0 ? " · 최장 " + Math.round(S.longestM) + " m" : "");
      $("overBest").textContent = "이번 세션 최고: 홈런 " + S.best + "개" + (fbReady ? "" : " · (온라인 랭킹은 배포 후)");
      $("regBox").hidden = !fbReady;
      if (fbReady) { $("regBtn").disabled = S.submitted; $("nameInput").value = S.playerName; if (!S.submitted) $("regMsg").textContent = ""; }
    }
    var playing = (S.phase === "ready" || S.phase === "pitch" || S.phase === "flight" || S.phase === "result");
    $("throwBtn").hidden = !(playing && S.phase === "ready");
    $("swingBtn").hidden = !(playing && S.phase === "pitch");
    $("waitBtn").hidden = !(playing && (S.phase === "flight" || S.phase === "result"));
  }
  function primaryAction() { if (S.phase === "ready") throwPitch(); else if (S.phase === "pitch") swing(); }

  try {
    renderer = new THREE.WebGLRenderer({ antialias: true });
    cvwrap.appendChild(renderer.domElement);
    buildScene(); clock = new THREE.Clock(); sizeRenderer();
    window.addEventListener("resize", sizeRenderer); loop();
  } catch (e) { $("webglWarn").hidden = false; }

  (function () {
    var grid = $("teamGrid");
    for (var i = 0; i < TEAMS.length; i++) {
      (function (idx) { var btn = document.createElement("button"); btn.textContent = TEAMS[idx].a; btn.style.background = "#" + TEAMS[idx].p.toString(16).padStart(6, "0"); btn.addEventListener("click", function () { selectTeam(idx); }); grid.appendChild(btn); })(i);
    }
  })();
  if (scene) selectTeam(0);

  $("startBtn").addEventListener("click", startGame);
  $("throwBtn").addEventListener("click", throwPitch);
  $("swingBtn").addEventListener("click", swing);
  cvwrap.addEventListener("click", function () { if (S.phase === "ready" || S.phase === "pitch") primaryAction(); });
  $("muteBtn").addEventListener("click", function () { S.muted = !S.muted; $("muteBtn").textContent = S.muted ? "🔇" : "🔊"; });
  $("againBtn").addEventListener("click", startGame);
  $("homeBtn").addEventListener("click", backToStart);
  $("regBtn").addEventListener("click", submitScore);
  $("lbBtn1").addEventListener("click", openLeaderboard);
  $("lbBtn2").addEventListener("click", openLeaderboard);
  $("lbClose").addEventListener("click", function () { $("lbOv").hidden = true; });
  window.addEventListener("keydown", function (e) { if (e.code !== "Space" || e.repeat) return; if (S.phase === "ready" || S.phase === "pitch") { e.preventDefault(); primaryAction(); } });

  initFirebase(); updateUI();
});
</script>
