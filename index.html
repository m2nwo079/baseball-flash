<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="가볍게 즐기는 게임을 모아 바로 플레이하는 게임 포털, Baseball Flash">
<title>Baseball Flash — 게임 포털</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-head">
  <h1 class="wordmark">BASEBALL<span class="dot"> FLASH</span></h1>
  <p class="tagline">가볍게 즐기는 게임을 모아 골라서 바로 플레이하세요.</p>
</header>

<!-- 히어로: 대표 게임을 크게 노출 (내용은 portal.js가 매니페스트에서 채움) -->
<div class="hero-wrap">
  <section class="hero" id="hero" hidden aria-label="대표 게임">
    <div class="hero__bgword" id="heroBgWord" aria-hidden="true"></div>
    <div class="hero__body">
      <span class="hero__badge">추천</span>
      <h2 class="hero__title" id="heroTitle"></h2>
      <p class="hero__desc" id="heroDesc"></p>
      <button class="btn btn--play hero__cta" id="heroPlay">지금 플레이 ▶</button>
    </div>
    <div class="hero__art" aria-hidden="true">
      <svg width="140" height="140" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="38" fill="#fbfbf7" stroke="#cfd5de" stroke-width="1.5"/>
        <path d="M30 16 Q18 50 30 84" fill="none" stroke="#e24b4a" stroke-width="2.4" stroke-dasharray="2 5" stroke-linecap="round"/>
        <path d="M70 16 Q82 50 70 84" fill="none" stroke="#e24b4a" stroke-width="2.4" stroke-dasharray="2 5" stroke-linecap="round"/>
      </svg>
    </div>
  </section>
</div>

<div class="section-head"><h2 class="section-title">게임</h2></div>
<main id="grid" class="grid" aria-label="게임 목록"></main>

<footer class="site-foot">© 2026 Baseball Flash. 간단한 게임들을 모아 즐기는 포털.</footer>

<!-- 게임이 실행되는 슬롯(선택 시에만 iframe 생성, 나가면 파기) -->
<section id="player" class="player" hidden aria-label="게임 플레이어">
  <div class="player__bar">
    <h2 id="playerTitle" class="player__title"></h2>
    <button id="fsBtn" class="bar-btn" aria-label="전체화면">전체화면</button>
    <button id="exitBtn" class="bar-btn bar-btn--exit" aria-label="게임 나가기">나가기</button>
  </div>
  <div id="frameHost" class="frame-host"></div>
</section>

<script type="module" src="portal.js"></script>
</body>
</html>
